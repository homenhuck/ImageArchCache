{{- if .Values.certManager.enabled }}
apiVersion: cert-manager.io/v1
kind: Certificate
metadata:
  name: image-arch-webhook-tls
  namespace: {{ .Values.namespace }}
spec:
  secretName: image-arch-webhook-tls
  dnsNames:
  - image-arch-webhook.{{ .Values.namespace }}.svc
  - image-arch-webhook.{{ .Values.namespace }}.svc.cluster.local
  issuerRef:
    name: selfsigned-issuer
    kind: ClusterIssuer
  duration: 8760h   # 1 year
  renewBefore: 720h  # renew 30 days before expiry
---
apiVersion: cert-manager.io/v1
kind: ClusterIssuer
metadata:
  name: selfsigned-issuer
spec:
  selfSigned: {}
{{- end }}
